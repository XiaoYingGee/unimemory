version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: unimemory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unimemory
      POSTGRES_PASSWORD: unimemory
      POSTGRES_DB: unimemory
    ports:
      - "5432:5432"
    volumes:
      - unimemory-pgdata:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimemory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  unimemory-pgdata:
    name: unimemory-pgdata
    labels:
      project: unimemory
      env: dev
