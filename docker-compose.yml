version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: unimemory-postgres
    environment:
      POSTGRES_USER: unimemory
      POSTGRES_PASSWORD: unimemory
      POSTGRES_DB: unimemory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimemory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
